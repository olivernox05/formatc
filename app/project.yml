name: FormatC
options:
  bundleIdPrefix: app.toolsai.formatc
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  FormatC:
    type: application
    platform: macOS
    sources:
      - path: FormatC
        excludes:
          - "FormatC.entitlements"
    resources:
      - path: FormatC/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.toolsai.formatc
        # Product renamed to "Format" (2026-07); bundle id deliberately
        # stays app.toolsai.formatc so Gatekeeper approvals and the
        # signature store (keyed on bundle id) survive the rename.
        PRODUCT_NAME: Format
        ARCHS: "arm64 x86_64"
        VALID_ARCHS: "arm64 x86_64"
        INFOPLIST_KEY_CFBundleDisplayName: Format
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: "© ToolsAI"
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: FormatC/FormatC.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: YES
        COMBINE_HIDPI_IMAGES: YES
      configs:
        Debug:
          ONLY_ACTIVE_ARCH: YES
        Release:
          ONLY_ACTIVE_ARCH: NO
